<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinAnaliz Pro — Finansal Analiz Platformu</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg0:#080c14;--bg1:#0f1623;--bg2:#161e30;--bg2h:#1c2740;--bgi:#0b1020;--brd:#232e48;--brdf:#3b82f6;--t1:#e2e8f4;--t2:#8494b2;--tm:#546078;--ac:#3b82f6;--acd:rgba(59,130,246,.12);--gn:#10b981;--gnd:rgba(16,185,129,.1);--rd:#ef4444;--am:#f59e0b;--pu:#8b5cf6;--sw:360px;--hh:54px}
body{font-family:'DM Sans',sans-serif;background:var(--bg0);color:var(--t1);min-height:100vh;overflow:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:4px}
.app{display:flex;height:100vh}.sidebar{width:var(--sw);min-width:var(--sw);background:var(--bg1);border-right:1px solid var(--brd);display:flex;flex-direction:column;transition:all .3s;overflow:hidden;z-index:50}.sidebar.collapsed{width:0;min-width:0;border:none}
.sb-brand{height:var(--hh);display:flex;align-items:center;gap:10px;padding:0 16px;border-bottom:1px solid var(--brd);flex-shrink:0}.brand-i{width:30px;height:30px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff}.brand-n{font-size:14px;font-weight:600}.brand-s{font-size:8px;color:var(--tm);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1.5px}
.sb-tabs{display:flex;border-bottom:1px solid var(--brd);flex-shrink:0;background:var(--bg0)}.sb-tab{flex:1;padding:10px 6px;font-size:11px;font-weight:500;color:var(--tm);background:none;border:none;cursor:pointer;text-align:center;border-bottom:2px solid transparent;transition:all .2s;font-family:'DM Sans',sans-serif}.sb-tab:hover{color:var(--t2)}.sb-tab.on{color:var(--ac);border-bottom-color:var(--ac)}
.sb-scroll{flex:1;overflow-y:auto}.sb-cat{border-bottom:1px solid rgba(35,46,72,.5)}.sb-cat-h{padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--t2);transition:background .15s;user-select:none}.sb-cat-h:hover{background:var(--bg2)}.sb-cat-h .arr{margin-left:auto;font-size:8px;transition:transform .2s}.sb-cat-h.open .arr{transform:rotate(90deg)}
.fc{padding:10px 14px 10px 26px;border-bottom:1px solid rgba(35,46,72,.3)}.fc:hover{background:rgba(59,130,246,.04)}.fc-n{font-size:11px;font-weight:500;margin-bottom:2px}.fc-f{font-size:10px;color:var(--ac);font-family:'JetBrains Mono',monospace;margin-bottom:2px}.fc-i{font-size:9px;color:var(--tm)}
.cb{padding:14px;border-bottom:1px solid rgba(35,46,72,.5)}.cb-l{font-size:9px;color:var(--tm);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}.cb canvas{width:100%!important;height:170px!important}
.tgl{width:24px;height:24px;background:var(--bg2);border:1px solid var(--brd);border-radius:5px;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .3s;flex-shrink:0;align-self:center}.tgl:hover{background:var(--ac);color:#fff}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.pbar{display:flex;align-items:center;gap:7px;padding:10px 18px;background:var(--bg1);border-bottom:1px solid var(--brd);flex-wrap:wrap;flex-shrink:0}.plab{font-size:9px;color:var(--tm);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1.5px;margin-right:4px}
.chip{padding:4px 12px;border-radius:16px;font-size:11px;font-weight:500;border:1px solid var(--brd);background:transparent;color:var(--t2);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}.chip:hover{border-color:var(--ac);color:var(--ac)}.chip.on{background:var(--ac);border-color:var(--ac);color:#fff}.chip.add{border-style:dashed;color:var(--tm)}.chip.add:hover{border-color:var(--gn);color:var(--gn)}.chip .x{font-size:8px;opacity:.5;cursor:pointer}.chip .x:hover{opacity:1;color:var(--rd)}
.mtabs{display:flex;background:var(--bg1);border-bottom:1px solid var(--brd);padding:0 18px;flex-shrink:0}.mtab{padding:11px 16px;font-size:12px;font-weight:500;color:var(--tm);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-family:'DM Sans',sans-serif}.mtab:hover{color:var(--t2)}.mtab.on{color:var(--ac);border-bottom-color:var(--ac)}
.cont{flex:1;overflow-y:auto;padding:18px}
.card{background:var(--bg2);border:1px solid var(--brd);border-radius:10px;overflow:hidden;margin-bottom:16px;animation:fi .4s ease}.card-h{padding:12px 16px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between}.card-t{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}.card-b{padding:16px}
.uz{border:2px dashed var(--brd);border-radius:10px;padding:26px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:12px}.uz:hover{border-color:var(--ac);background:var(--acd)}.uz.dov{border-color:var(--gn);background:var(--gnd)}.uz-i{font-size:26px;margin-bottom:4px}.uz-t{font-size:12px;color:var(--t2)}.uz-h{font-size:10px;color:var(--tm);margin-top:2px}
.st{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--ac);font-family:'JetBrains Mono',monospace;margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--brd)}.st:first-child{margin-top:0}
.ig{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:7px}.igr{display:flex;flex-direction:column;gap:2px}.igl{font-size:10px;color:var(--t2);font-weight:500}.inp{background:var(--bgi);border:1px solid var(--brd);border-radius:5px;padding:6px 8px;color:var(--t1);font-size:12px;font-family:'JetBrains Mono',monospace;outline:none;transition:border-color .2s;width:100%}.inp:focus{border-color:var(--ac)}.inp::placeholder{color:var(--tm);font-size:10px}.inp.filled{border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.04)}
.rcat{margin-bottom:20px}.rcat-h{font-size:12px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:9px}
.rc{background:var(--bgi);border:1px solid var(--brd);border-radius:7px;padding:11px;border-left:3px solid var(--tm);transition:all .2s}.rc:hover{background:var(--bg2h)}.rc-n{font-size:10px;color:var(--t2);font-weight:500;margin-bottom:4px}.rc-v{font-size:19px;font-weight:700;font-family:'JetBrains Mono',monospace}.rc-s{font-size:9px;color:var(--tm);margin-top:3px;font-family:'JetBrains Mono',monospace}
.ctb{width:100%;border-collapse:separate;border-spacing:0;font-size:11px}.ctb th,.ctb td{padding:8px 11px;text-align:right;border-bottom:1px solid var(--brd)}.ctb th{background:var(--bgi);color:var(--tm);font-size:9px;text-transform:uppercase;letter-spacing:1px;font-family:'JetBrains Mono',monospace;position:sticky;top:0;z-index:2}.ctb th:first-child,.ctb td:first-child{text-align:left;color:var(--t1);font-weight:500}.ctb td{font-family:'JetBrains Mono',monospace;color:var(--t2)}.ctb tr:hover td{background:rgba(59,130,246,.03)}.cp{color:var(--gn)!important}.cn{color:var(--rd)!important}
.aip{background:linear-gradient(135deg,rgba(59,130,246,.06),rgba(139,92,246,.06));border:1px solid rgba(59,130,246,.2);border-radius:10px;overflow:hidden}.aip-h{padding:12px 16px;border-bottom:1px solid rgba(59,130,246,.12);display:flex;align-items:center;justify-content:space-between}.aip-t{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}.aip-b{padding:16px;font-size:12px;line-height:1.75;color:var(--t2);white-space:pre-wrap;max-height:65vh;overflow-y:auto}.aip-ph{text-align:center;padding:28px;color:var(--tm)}
.aip-ld{display:flex;align-items:center;gap:10px;padding:20px;color:var(--tm);font-size:12px}.dp span{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--ac);margin:0 2px;animation:dp 1.4s ease-in-out infinite}.dp span:nth-child(2){animation-delay:.2s}.dp span:nth-child(3){animation-delay:.4s}@keyframes dp{0%,80%,100%{opacity:.15;transform:scale(.7)}40%{opacity:1;transform:scale(1.2)}}
.btn{padding:6px 14px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--brd);background:var(--bg2);color:var(--t1);font-family:'DM Sans',sans-serif;transition:all .2s;display:inline-flex;align-items:center;gap:4px}.btn:hover{background:var(--bg2h)}.btn-p{background:var(--ac);border-color:var(--ac);color:#fff}.btn-p:hover{background:#2563eb}.btn-p:disabled{opacity:.5;cursor:not-allowed}.btn-g{background:var(--gn);border-color:var(--gn);color:#fff}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}.mod{background:var(--bg2);border:1px solid var(--brd);border-radius:12px;width:100%;max-width:400px}.mod-h{padding:16px 20px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between}.mod-t{font-size:14px;font-weight:600}.mod-x{background:none;border:none;color:var(--tm);cursor:pointer;font-size:18px}.mod-b{padding:20px}.mod-f{padding:12px 20px;border-top:1px solid var(--brd);display:flex;justify-content:flex-end;gap:7px}
.plog{margin-top:10px;padding:10px;background:var(--bgi);border:1px solid var(--brd);border-radius:6px;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--t2);max-height:150px;overflow-y:auto;line-height:1.6}.plog .ok{color:var(--gn)}.plog .warn{color:var(--am)}.plog .err{color:var(--rd)}.plog .info{color:var(--ac)}
.score-c{display:flex;flex-direction:column;align-items:center;gap:6px;padding:18px}.score-ring{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;font-family:'JetBrains Mono',monospace;border:4px solid var(--brd)}.score-l{font-size:10px;color:var(--tm);text-transform:uppercase;letter-spacing:1px;font-family:'JetBrains Mono',monospace}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{border-color:var(--rd);background:rgba(239,68,68,.08)}50%{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.02)}}
.inp.missing{animation:blink 1.5s ease-in-out infinite;border-color:var(--rd)}
.loading-overlay{position:fixed;inset:0;background:rgba(8,12,20,.85);z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.loading-overlay .spinner{width:40px;height:40px;border:3px solid var(--brd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite}
.loading-overlay .loading-text{font-size:14px;color:var(--t2);font-weight:500}
.loading-overlay .loading-sub{font-size:11px;color:var(--tm)}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:900px){.sidebar{position:fixed;left:0;top:0;bottom:0;z-index:200}.sidebar.collapsed{transform:translateX(-100%)}.ig{grid-template-columns:1fr 1fr}.rgrid{grid-template-columns:1fr}}
@media(max-width:600px){.ig{grid-template-columns:1fr}.rgrid{grid-template-columns:1fr}}

/* AUTH OVERLAY */
.auth-overlay{position:fixed;inset:0;background:var(--bg0);z-index:100;display:flex;align-items:center;justify-content:center}
.auth-box{background:var(--bg2);border:1px solid var(--brd);border-radius:16px;padding:40px 36px;width:100%;max-width:400px;text-align:center}
.auth-logo{width:52px;height:52px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:22px;color:#fff;margin:0 auto 16px}
.auth-title{font-size:20px;font-weight:700;margin-bottom:6px}
.auth-sub{font-size:12px;color:var(--t2);margin-bottom:28px;line-height:1.6}
.auth-btn{display:block;width:100%;padding:11px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .2s;margin-bottom:10px}
.auth-btn-p{background:var(--ac);color:#fff}.auth-btn-p:hover{background:#2563eb}
.auth-btn-g{background:var(--bg1);color:var(--t1);border:1px solid var(--brd)}.auth-btn-g:hover{background:var(--bg2h)}

/* USER BAR */
.userbar{display:flex;align-items:center;gap:8px;padding:8px 14px;border-top:1px solid var(--brd);flex-shrink:0;background:var(--bg0)}
.userbar-av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.userbar-nm{font-size:11px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.userbar-out{background:none;border:1px solid var(--brd);border-radius:4px;color:var(--tm);font-size:10px;cursor:pointer;padding:3px 7px;font-family:'DM Sans',sans-serif;transition:all .2s}.userbar-out:hover{color:var(--rd);border-color:var(--rd)}

/* SECTOR SELECT */
.sector-bar{display:flex;align-items:center;gap:7px;padding:7px 18px;background:var(--bgi);border-bottom:1px solid var(--brd);flex-shrink:0;flex-wrap:wrap}
.sector-lbl{font-size:9px;color:var(--tm);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1.5px;flex-shrink:0}
.sector-sel{background:var(--bg2);border:1px solid var(--brd);border-radius:6px;color:var(--t1);font-size:11px;padding:4px 10px;font-family:'DM Sans',sans-serif;cursor:pointer;outline:none;transition:border-color .2s}.sector-sel:focus{border-color:var(--ac)}
.sector-badge{padding:3px 9px;border-radius:10px;font-size:10px;font-weight:600;background:var(--acd);color:var(--ac);border:1px solid rgba(59,130,246,.25);font-family:'JetBrains Mono',monospace}

/* SAVED ANALYSES */
.saved-item{background:var(--bgi);border:1px solid var(--brd);border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:8px;transition:all .2s;cursor:pointer}.saved-item:hover{background:var(--bg2h);border-color:var(--brdf)}
.saved-dot{width:8px;height:8px;border-radius:50%;background:var(--ac);flex-shrink:0}
.saved-info{flex:1;min-width:0}
.saved-name{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.saved-meta{font-size:10px;color:var(--tm);font-family:'JetBrains Mono',monospace;margin-top:2px}
.saved-del{background:none;border:none;color:var(--tm);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px;transition:all .2s}.saved-del:hover{color:var(--rd);background:rgba(239,68,68,.1)}

/* SAVE BTN */
.btn-save-anim{animation:savePulse .6s ease}@keyframes savePulse{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
</style>
</head>
<body>
<!-- AUTH OVERLAY -->
<div id="authOverlay" class="auth-overlay">
  <div class="auth-box">
    <div class="auth-logo">F</div>
    <div class="auth-title">FinAnaliz Pro</div>
    <div class="auth-sub">Finansal analizlerinize güvenli erişim için<br>giriş yapın veya hesap oluşturun.</div>
    <button class="auth-btn auth-btn-p" onclick="document.getElementById('authOverlay').style.zIndex='50';netlifyIdentity.open('login')">📧 E-posta ile Giriş</button>
    <button class="auth-btn auth-btn-g" onclick="document.getElementById('authOverlay').style.zIndex='50';netlifyIdentity.open('login')">🔑 Google ile Giriş</button>
    <div style="font-size:10px;color:var(--tm);margin-top:12px">Hesabınız yok mu? <span style="color:var(--ac);cursor:pointer" onclick="document.getElementById('authOverlay').style.zIndex='50';netlifyIdentity.open('signup')">Kayıt Ol</span></div>
  </div>
</div>

<div class="app" id="app" style="display:none">
<div class="sidebar" id="sidebar">
<div class="sb-brand"><div class="brand-i">F</div><div><div class="brand-n">FinAnaliz Pro</div><div class="brand-s">Finansal Analiz Platformu</div></div><button class="tgl" id="tglBtn" onclick="tglSB()" style="margin-left:auto">◀</button></div>
<div class="sb-tabs"><button class="sb-tab on" data-st="formulas" onclick="sSTab('formulas')">📐 Formüller</button><button class="sb-tab" data-st="charts" onclick="sSTab('charts')">📊 Grafikler</button><button class="sb-tab" data-st="saved" onclick="sSTab('saved')">💾 Kayıtlı</button></div>
<div class="sb-scroll" id="sbCont"></div>
<div class="userbar" id="userBar"><div class="userbar-av" id="userAv">?</div><div class="userbar-nm" id="userNm">Yükleniyor...</div><button class="userbar-out" onclick="doLogout()">Çıkış</button></div>
</div>
<div class="main">
<div class="sector-bar">
  <span class="sector-lbl">Sektör:</span>
  <select class="sector-sel" id="sektorSel" onchange="S.sektor=this.value;rRatIfActive();updateSectorBadge()">
    <option value="">— Sektör Seçin —</option>
    <option value="genel">🏢 Genel</option>
    <option value="insaat">🏗️ İnşaat</option>
    <option value="turizm">🏨 Turizm & Otelcilik</option>
    <option value="perakende">🛒 Perakende</option>
    <option value="imalat">🏭 İmalat</option>
    <option value="hizmet">💼 Hizmet</option>
    <option value="lojistik">🚛 Lojistik & Nakliye</option>
    <option value="gida">🍽️ Gıda & Tarım</option>
    <option value="teknoloji">💻 Teknoloji</option>
    <option value="enerji">⚡ Enerji</option>
  </select>
  <span class="sector-badge" id="sektorBadge" style="display:none"></span>
  <div style="flex:1"></div>
  <button class="btn" id="saveBtn" onclick="saveAnaliz()" style="font-size:11px" title="Bu analizi kaydet">💾 Kaydet</button>
</div>
<div class="pbar" id="pBar"></div>
<div class="mtabs"><button class="mtab on" data-mt="input" onclick="sTab('input')">📥 Veri Girişi</button><button class="mtab" data-mt="ratios" onclick="sTab('ratios')">📊 Rasyolar</button><button class="mtab" data-mt="compare" onclick="sTab('compare')">⚖️ Karşılaştırma</button><button class="mtab" data-mt="ai" onclick="sTab('ai')">🤖 Uzman Yorum</button></div>
<div class="cont" id="cont"></div>
</div>
</div>
<div class="mo" id="moOv" style="display:none" onclick="closeMo()"><div class="mod" onclick="event.stopPropagation()"><div class="mod-h"><div class="mod-t" id="moTitle">Yeni Dönem Ekle</div><button class="mod-x" onclick="closeMo()">×</button></div><div class="mod-b"><div class="igr"><label class="igl" id="moLabel">Dönem Adı</label><input class="inp" id="moInp" placeholder="ör: 2024, 2023 3.Dönem, 2024 Q2" onkeydown="if(event.key==='Enter')moConfirm()"><div style="margin-top:6px;font-size:10px;color:var(--am)">⚠ Dönem adı karşılaştırma sıralaması için önemlidir. Lütfen yılı mutlaka belirtin.</div></div></div><div class="mod-f"><button class="btn" onclick="closeMo()">İptal</button><button class="btn btn-p" onclick="moConfirm()">Tamam</button></div></div></div>
<script>
// THP ACCOUNT MAP
const THP={
cashEquivalents:{codes:['100','101','102','103','108']},
tradeReceivables:{codes:['120','121','122','126'],neg:['128','129']},
otherReceivables:{codes:['131','132','133','135','136','137','138'],neg:['139']},
inventory:{codes:['150','151','152','153','157','159'],neg:['158']},
prepaidCurrent:{codes:['180','181']},
otherCurrentAssets:{codes:['190','191','192','193','195','196'],neg:['197']},
financialAssets:{codes:['240','241','242','243','244','245','246','247','248'],neg:['249']},
tangibleAssets:{codes:['250','251','252','253','254','255','256','259','264','265'],neg:['257']},
intangibleAssets:{codes:['260','261','262','263','267'],neg:['268']},
prepaidLong:{codes:['280','281']},
stFinDebt:{codes:['300','301','303','304','305','306','308','309'],neg:['302']},
tradePayables:{codes:['320','321','322','326','329']},
otherSTDebt:{codes:['331','332','333','335','336','337','339']},

// MIZAN PARSER
function parseMizan(rows){
  const log=[];const accts={};
  rows.forEach(r=>{const c=String(r.code||'').trim();if(!c||!/^\d{3}$/.test(c))return;accts[c]={d:parseFloat(r.debit)||0,c:parseFloat(r.credit)||0,n:String(r.name||'')}});
  log.push({t:'info',m:`Mizandan ${Object.keys(accts).length} adet 3 haneli hesap okundu`});
  const sD=(codes,neg)=>{let t=0;(codes||[]).forEach(c=>{if(accts[c])t+=accts[c].d-accts[c].c});(neg||[]).forEach(c=>{if(accts[c])t-=(accts[c].c-accts[c].d)});return t};
  const sC=(codes,neg)=>{let t=0;(codes||[]).forEach(c=>{if(accts[c])t+=accts[c].c-accts[c].d});(neg||[]).forEach(c=>{if(accts[c])t-=(accts[c].d-accts[c].c)});return t};
  const data=eD();
  // AKTİF
  const cash=sD(THP.cashEquivalents.codes);const trR=sD(THP.tradeReceivables.codes,THP.tradeReceivables.neg);const inv=sD(THP.inventory.codes,THP.inventory.neg);const othR=sD(THP.otherReceivables.codes,THP.otherReceivables.neg);const prepC=sD(THP.prepaidCurrent.codes);const othCA=sD(THP.otherCurrentAssets.codes,THP.otherCurrentAssets.neg);
  const curA=cash+trR+inv+othR+prepC+othCA;
  const finA=sD(THP.financialAssets.codes,THP.financialAssets.neg);const tanA=sD(THP.tangibleAssets.codes,THP.tangibleAssets.neg);const intA=sD(THP.intangibleAssets.codes,THP.intangibleAssets.neg);const prepL=sD(THP.prepaidLong.codes);
  const fixA=finA+tanA+intA+prepL;const totA=curA+fixA;
  data.cashEquivalents=r2(cash);data.tradeReceivables=r2(trR);data.inventory=r2(inv);data.currentAssets=r2(curA);data.fixedAssets=r2(fixA);data.totalAssets=r2(totA);
  // PASİF
  const stFD=sC(THP.stFinDebt.codes,THP.stFinDebt.neg);const trP=sC(THP.tradePayables.codes);const othSD=sC(THP.otherSTDebt.codes);const adv=sC(THP.advances.codes);const txP=sC(THP.taxesPay.codes);const stPr=sC(THP.stProvisions.codes,THP.stProvisions.neg);const defI=sC(THP.deferredInc.codes);
  const stL=stFD+trP+othSD+adv+txP+stPr+defI;
  const ltFD=sC(THP.ltFinDebt.codes,THP.ltFinDebt.neg);const ltO=sC(THP.ltOther.codes);const ltL=ltFD+ltO;
  const pC=sC(THP.paidCap.codes);const cR=sC(THP.capRes.codes);const pR=sC(THP.profRes.codes);const rE=sC(THP.retEarn.codes,THP.retEarn.neg);const pNP=sC(THP.periodNP.codes,THP.periodNP.neg);
  const eq=pC+cR+pR+rE+pNP;
  data.shortTermLiabilities=r2(stL);data.longTermLiabilities=r2(ltL);data.totalLiabilities=r2(stL+ltL);data.equity=r2(eq);
  // GELİR TABLOSU
  const gS=sC(THP.grossSales.codes);const sDed=sD(THP.salesDed.codes);const nS=gS-sDed;const cg=sD(THP.cogs.codes);const gP=nS-cg;
  const mE=sD(THP.mktExp.codes);const aE=sD(THP.admExp.codes);const rE2=sD(THP.rdExp.codes);const oE=mE+aE+rE2;const oP=gP-oE;
  const oOI=sC(THP.othOpInc.codes);const oOE=sD(THP.othOpExp.codes);
  const sfE=sD(THP.stFinExp.codes);const lfE=sD(THP.ltFinExp.codes);const fE=sfE+lfE;
  const eI=sC(THP.extInc.codes);const eE=sD(THP.extExp.codes);
  const pP=oP+oOI-oOE-fE+eI-eE;
  data.netSales=r2(nS);data.cogs=r2(cg);data.grossProfit=r2(gP);data.operatingExpenses=r2(oE);data.operatingProfit=r2(oP);data.financialIncome=r2(oOI);data.financialExpenses=r2(fE);data.netProfit=r2(pP);
  log.push({t:'ok',m:`Toplam Aktif: ${fC(totA)}`});log.push({t:'ok',m:`Toplam Pasif: ${fC(stL+ltL+eq)}`});
  log.push({t:'ok',m:`Net Satışlar: ${fC(nS)}`});log.push({t:'ok',m:`Faaliyet Kârı: ${fC(oP)}`});log.push({t:'ok',m:`Dönem Kârı: ${fC(pP)}`});
  const diff=Math.abs(totA-(stL+ltL+eq));
  log.push(diff<2?{t:'ok',m:'Aktif = Pasif ✓ Bilanço denk'}:{t:'warn',m:`Aktif-Pasif fark: ${fC(diff)}`});
  return{data,log};
}

// GELIR TABLOSU PARSER
function parseGT(rows,tIdx){
  const log=[];const data=eD();
  let valColA=-1,valColB=-1;const startRow=1;
  for(let i=startRow;i<rows.length;i++){
    const code=parseFloat(rows[i][0]);
    if(code>=60&&code<=68&&code===Math.floor(code)){
      for(let j=2;j<rows[i].length;j++){const v=parseFloat(rows[i][j]);if(!isNaN(v)&&v!==0){if(valColA===-1)valColA=j;else if(j!==valColA&&valColB===-1)valColB=j}}
      break;
    }
  }
  const useCol=tIdx===1?(valColB!==-1?valColB:valColA):(valColA!==-1?valColA:3);
  // Detect period names from header
  const hdr=rows[0]||[];
  const periods=[];
  hdr.forEach((v,j)=>{const m=String(v||'').match(/(\d{4})/);if(m)periods.push({col:j,year:parseInt(m[1])})});
  if(periods.length>=2)log.push({t:'info',m:`Dönemler: ${periods.map(p=>p.year).join(' vs ')} → ${tIdx===1?'Sağ':'Sol'} dönem seçildi`});

  const parsed={};
  for(let i=startRow;i<rows.length;i++){
    const row=rows[i];const code=parseFloat(row[0]);const name=String(row[1]||'').trim().toUpperCase();const val=parseFloat(row[useCol]);
    if(!isNaN(code)&&code>=60&&code<=69&&code===Math.floor(code)&&!isNaN(val))parsed['g'+Math.floor(code)]=val;
    if(isNaN(code)&&name){
      if(name.includes('NET SAT'))parsed.netSales=val;
      else if(name.includes('BRÜT SAT')&&name.includes('KAR'))parsed.grossProfit=val;
      else if(name.includes('FAALİYET KAR'))parsed.opProfit=val;
      else if(name.includes('DÖNEM KAR')&&!name.includes('NET')&&!name.includes('VERGİ'))parsed.periodProfit=val;
      else if(name.includes('VERGİ'))parsed.tax=Math.abs(val);
      else if(name.includes('DÖNEM NET'))parsed.netProfit=val;
    }
  }
  data.netSales=r2(parsed.netSales||(parsed.g60?(parsed.g60+(parsed.g61||0)):0));
  data.cogs=r2(Math.abs(parsed.g62||0));data.grossProfit=r2(parsed.grossProfit||(pF(data.netSales)-pF(data.cogs)));
  data.operatingExpenses=r2(Math.abs(parsed.g63||0));data.operatingProfit=r2(parsed.opProfit||(pF(data.grossProfit)-pF(data.operatingExpenses)));
  data.financialIncome=r2(parsed.g64||0);data.financialExpenses=r2(Math.abs(parsed.g66||0));
  data.taxExpense=r2(parsed.tax||0);data.netProfit=r2(parsed.netProfit||0);
  if(pF(data.netSales))log.push({t:'ok',m:`Net Satışlar: ${fC(pF(data.netSales))}`});
  if(pF(data.netProfit))log.push({t:'ok',m:`Net Kâr: ${fC(pF(data.netProfit))}`});
  return{data,log};
}

    log.push({t:'info',m:`Sütunlar → Kod:${cC} Ad:${nC} B.Borç:${dC} B.Alacak:${crC}`});
    const mR=[];for(let i=1;i<raw.length;i++){const r=raw[i];mR.push({code:String(r[cC]||'').trim(),name:String(r[nC]||''),debit:parseFloat(r[dC])||0,credit:parseFloat(r[crC])||0})}

    let tIdx=1;if(periods.length>=2)tIdx=periods[1].year>periods[0].year?1:0;
    const res=parseGT(raw,tIdx);return{data:res.data,log:[...log,...res.log]};
  }
  log.push({t:'warn',m:'Format tanınamadı — AI ile parse denenecek...'});
  return{data:eD(),log,needAI:true,rawText:raw.slice(0,80).map(r=>r.join(' | ')).join('\n')};
}

// HELPERS
// Parse Turkish number format: 495.493.963,13 → 495493963.13
function parseTR(s){
  if(!s)return NaN;
  s=String(s).trim().replace(/[^\d.,-]/g,'');
  if(!s)return NaN;
  // If has comma, it's Turkish decimal separator
  if(s.includes(',')){
    // Remove dots (thousand sep), replace comma with dot (decimal)
    s=s.replace(/\./g,'').replace(',','.');
  }
  // If no comma but multiple dots like 495.493.963 — those are thousand separators
  else if((s.match(/\./g)||[]).length>1){
    s=s.replace(/\./g,'');
  }
  return parseFloat(s);
}
function r2(v){return v?String(Math.round(v*100)/100):''}
function pF(v){return parseFloat(v)||0}

function fC(v){if(!v&&v!==0)return"—";const n=Number(v);if(isNaN(n)||n===0)return"—";return new Intl.NumberFormat('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n)+' ₺'}

function fCS(v){const n=Number(v);if(isNaN(n))return"—";if(Math.abs(n)>=1e9)return(n/1e9).toFixed(1)+"B";if(Math.abs(n)>=1e6)return(n/1e6).toFixed(1)+"M";if(Math.abs(n)>=1e3)return(n/1e3).toFixed(0)+"K";return String(n)}

async function hFile(file){
  if(!file)return;

  if(p.fileName){
    if(!confirm('Bu dönemde zaten veri var. Üzerine yazmak istiyor musunuz?\n\nFarklı bir dönem için yukarıdaki "+ Dönem Ekle" butonunu kullanın.'))return;

async function processFile(file){
const ext=file.name.split('.').pop().toLowerCase();const p=S.periods[S.ap];p.fileName=file.name;p.parseLog=[{t:'info',m:`Dosya: ${file.name} (${(file.size/1024).toFixed(0)}KB)`}];
showLoading('Veriler Analiz Ediliyor...','Dosya okunuyor ve finansal veriler çıkarılıyor');
render();
if(['xlsx','xls','csv'].includes(ext)){const buf=await file.arrayBuffer();const wb=XLSX.read(buf,{type:'array'});p.parseLog.push({t:'info',m:`Sayfalar: ${wb.SheetNames.join(', ')}`});
const res=classifyExcel(wb);p.parseLog=[...p.parseLog,...res.log];
if(res.needAI){const ai=await parseExcelAI(res.rawText);p.parseLog=[...p.parseLog,...ai.log];mergeD(p,ai.data)}else mergeD(p,res.data);
p.missingFields=getMissing(p);
const filled=FIELDS.flatMap(s=>s.fields).filter(f=>p.data[f.key]&&p.data[f.key]!=='0').length;
hideLoading();
if(filled===0){p.parseLog.push({t:'err',m:'❌ Dosyadan veri okunamadı. Lütfen verileri manuel olarak girin.'});S.tab='input'}
else if(p.missingFields.length>3){p.parseLog.push({t:'warn',m:`⚠ ${p.missingFields.length} alan okunamadı — lütfen eksik alanları kontrol edin`});S.tab='input'}

async function saveAnaliz(){
  if(!S.user){alert('Lütfen giriş yapın.');return}
  const p=S.periods[S.ap];
  if(!Object.values(p.data).some(v=>v)){alert('Kaydedilecek veri yok. Önce analiz yapın.');return}
  const sirketAdi=prompt('Şirket adı (isteğe bağlı):',p.fileName?.replace(/\.[^/.]+$/,'')||'');
  if(sirketAdi===null)return;
  const btn=document.getElementById('saveBtn');
  const orig=btn.textContent;btn.textContent='Kaydediliyor...';btn.disabled=true;
  const d=nd(p);const rasyoJson={};
  Object.entries(RATIOS).forEach(([,cat])=>cat.items.forEach(r=>{const v=r.calc(d);if(v!==null)rasyoJson[r.key]=parseFloat(v.toFixed(3))}));
  // Analiz kaydını oluştur
  const res=await sbCall('save',{sirketAdi,sektor:S.sektor,donem:p.name,rasyoJson,aiYorum:S.aiRes,dosyaAdi:p.fileName||''});
  if(!res.ok){btn.disabled=false;btn.textContent=orig;alert('Kayıt hatası: '+(res.error||'Bilinmeyen hata'));return}
  const analizId=res.id;
  // Eğer dosya varsa storage'a yükle
  if(p.rawFile&&analizId){
    btn.textContent='Dosya yükleniyor...';
    try{
      const buf=await p.rawFile.arrayBuffer();
      const bytes=new Uint8Array(buf);
      let bin='';for(let i=0;i<bytes.length;i++)bin+=String.fromCharCode(bytes[i]);
      const b64=btoa(bin);
      const mime=p.rawFile.type||'application/octet-stream';
      await sbCall('uploadFile',{analizId,dosyaAdi:p.fileName,base64Data:b64,mimeType:mime});
    }catch(e){console.warn('Dosya yüklenemedi:',e)}
  }
  btn.disabled=false;btn.textContent='✓ Kaydedildi';btn.classList.add('btn-save-anim');
  await loadSavedList();
  setTimeout(()=>{btn.textContent=orig;btn.classList.remove('btn-save-anim')},2000);
}
